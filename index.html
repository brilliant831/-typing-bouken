<script>
/* ================= ローマ字テーブル ================= */
const ROMAJI = {
  "あ":["a"],"い":["i"],"う":["u","wu"],"え":["e"],"お":["o"],
  "か":["ka","ca"],"き":["ki"],"く":["ku","cu","qu"],"け":["ke"],"こ":["ko","co"],
  "さ":["sa"],"し":["shi","si","ci"],"す":["su"],"せ":["se"],"そ":["so"],
  "た":["ta"],"ち":["chi","ti"],"つ":["tsu","tu"],"て":["te"],"と":["to"],
  "な":["na"],"に":["ni"],"ぬ":["nu"],"ね":["ne"],"の":["no"],
  "は":["ha"],"ひ":["hi"],"ふ":["fu","hu"],"へ":["he"],"ほ":["ho"],
  "ま":["ma"],"み":["mi"],"む":["mu"],"め":["me"],"も":["mo"],
  "や":["ya"],"ゆ":["yu"],"よ":["yo"],
  "ら":["ra"],"り":["ri"],"る":["ru"],"れ":["re"],"ろ":["ro"],
  "わ":["wa"],"を":["wo"],
  "が":["ga"],"ぎ":["gi"],"ぐ":["gu"],"げ":["ge"],"ご":["go"],
  "ざ":["za"],"じ":["ji","zi"],"ず":["zu"],"ぜ":["ze"],"ぞ":["zo"],
  "だ":["da"],"ぢ":["di"],"づ":["du","zu"],"で":["de"],"ど":["do"],
  "ば":["ba"],"び":["bi"],"ぶ":["bu"],"べ":["be"],"ぼ":["bo"],
  "ぱ":["pa"],"ぴ":["pi"],"ぷ":["pu"],"ぺ":["pe"],"ぽ":["po"],
  "きゃ":["kya"],"きゅ":["kyu"],"きょ":["kyo"],
  "しゃ":["sha","sya"],"しゅ":["shu","syu"],"しょ":["sho","syo"],
  "ちゃ":["cha","tya","cya"],"ちゅ":["chu","tyu","cyu"],"ちょ":["cho","tyo","cyo"],
  "にゃ":["nya"],"にゅ":["nyu"],"にょ":["nyo"],
  "ひゃ":["hya"],"ひゅ":["hyu"],"ひょ":["hyo"],
  "みゃ":["mya"],"みゅ":["myu"],"みょ":["myo"],
  "りゃ":["rya"],"りゅ":["ryu"],"りょ":["ryo"],
  "ぎゃ":["gya"],"ぎゅ":["gyu"],"ぎょ":["gyo"],
  "じゃ":["ja","zya","jya"],"じゅ":["ju","zyu","jyu"],"じょ":["jo","zyo","jyo"],
  "びゃ":["bya"],"びゅ":["byu"],"びょ":["byo"],
  "ぴゃ":["pya"],"ぴゅ":["pyu"],"ぴょ":["pyo"],
  "ふぁ":["fa"],"ふぃ":["fi"],"ふぇ":["fe"],"ふぉ":["fo"],
  "うぃ":["wi"],"うぇ":["we"],"うぉ":["uxo","who"],
  "てぃ":["thi","texi"],"でぃ":["dhi","dexi"],"でゅ":["dhu"],
  "ゔぁ":["va"],"ゔぃ":["vi"],"ゔ":["vu"],"ゔぇ":["ve"],"ゔぉ":["vo"],
  "ぁ":["la","xa"],"ぃ":["li","xi"],"ぅ":["lu","xu"],"ぇ":["le","xe"],"ぉ":["lo","xo"],
  "ー":["-"],
};
const SMALL_KANA = "ゃゅょぁぃぅぇぉ";
const VOWELS = "aiueo";

function tokenize(kana) {
  const units = [];
  let i = 0;
  while (i < kana.length) {
    const c = kana[i], next = kana[i + 1];
    if (next && SMALL_KANA.includes(next) && ROMAJI[c + next]) {
      units.push(c + next); i += 2;
    } else {
      units.push(c); i += 1;
    }
  }
  return units;
}

function getCandidates(units, i) {
  const u = units[i];
  if (u === "っ") {
    const res = [];
    if (i + 1 < units.length) {
      for (const c of getCandidates(units, i + 1)) {
        const ch = c[0];
        if (!VOWELS.includes(ch) && ch !== "n" && !res.includes(ch)) res.push(ch);
      }
    }
    res.push("ltu", "xtu", "ltsu");
    return res;
  }
  if (u === "ん") {
    const res = ["nn", "xn"];
    if (i + 1 < units.length) {
      const nxt = getCandidates(units, i + 1);
      const ok = nxt.every(c => !VOWELS.includes(c[0]) && c[0] !== "n" && c[0] !== "y");
      if (ok) res.push("n");
    }
    return res;
  }
  return ROMAJI[u] || null;
}

function buildGuide(units, unitIdx, buffer) {
  let s = "";
  for (let i = unitIdx; i < units.length; i++) {
    const cands = getCandidates(units, i);
    if (i === unitIdx) {
      const m = cands.find(c => c.startsWith(buffer)) || cands[0];
      s += m.slice(buffer.length);
    } else {
      s += cands[0];
    }
  }
  return s;
}

function processKey(engine, ch) {
  const { units, unitIdx, buffer, committed } = engine;
  if (unitIdx >= units.length) return { engine, result: "done" };
  const cands = getCandidates(units, unitIdx).filter(c => c.startsWith(buffer));
  const nb = buffer + ch;
  if (cands.some(c => c.startsWith(nb))) {
    const complete = cands.includes(nb) && !cands.some(c => c.length > nb.length && c.startsWith(nb));
    if (complete) {
      const ni = unitIdx + 1;
      return {
        engine: { units, unitIdx: ni, buffer: "", committed: committed + nb },
        result: ni >= units.length ? "word" : "hit",
      };
    }
    return { engine: { units, unitIdx, buffer: nb, committed }, result: "hit" };
  }
  if (cands.includes(buffer) && unitIdx + 1 < units.length) {
    return processKey({ units, unitIdx: unitIdx + 1, buffer: "", committed: committed + buffer }, ch);
  }
  return { engine, result: "miss" };
}

function toHiragana(s) {
  return s.replace(/[\u30a1-\u30f6]/g, c => String.fromCharCode(c.charCodeAt(0) - 0x60));
}

function findInvalidChars(kana) {
  const units = tokenize(kana);
  const bad = [];
  for (let i = 0; i < units.length; i++) {
    const u = units[i];
    if (u === "っ" || u === "ん") continue;
    if (!ROMAJI[u]) bad.push(u);
  }
  if (units[units.length - 1] === "っ") bad.push("っ(さいごには つかえないよ)");
  return [...new Set(bad)];
}

const CHEERS = ["すごい!", "やったね!", "その ちょうし!", "てんさい!?", "はやい!", "かんぺき!"];
const KEYBOARD_ROWS = ["qwertyuiop", "asdfghjkl", "zxcvbnm-"];
const PLAY_COUNT = 8;

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function esc(s) {
  return String(s).replace(/[&<>"']/g, c => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}

/* ================= サウンド ================= */
let audioCtx = null;
function playTone(freq, dur = 0.06, type = "sine", vol = 0.15) {
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const o = audioCtx.createOscillator(), g = audioCtx.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start(); o.stop(audioCtx.currentTime + dur);
  } catch (e) { /* 音が出なくてもOK */ }
}

/* ================= 保存 ================= */
const store = {
  get(key, fallback) {
    try {
      const v = localStorage.getItem(key);
      return v ? JSON.parse(v) : fallback;
    } catch (e) { return fallback; }
  },
  set(key, val) {
    try { localStorage.setItem(key, JSON.stringify(val)); } catch (e) { /* 保存できなくてもOK */ }
  },
};

/* カテゴリ読み込み(初回はデフォルトを植え付け + 旧バージョンのじぶんのことばを引き継ぐ) */
function loadCats() {
  let cats = store.get("typing-cats-v2", null);
  if (!cats) {
    cats = JSON.parse(JSON.stringify(DEFAULT_CATS));
    const oldCustom = store.get("typing-custom-words", []);
    if (oldCustom.length) {
      const jibun = cats.find(c => c.id === "jibun");
      jibun.words.push(...oldCustom);
    }
    store.set("typing-cats-v2", cats);
  }
  return cats;
}

/* ================= 状態 ================= */
const S = {
  screen: "home",
  game: null,
  soundOn: true,
  result: null,
  cats: loadCats(),
  editCatId: null,
  editorMsg: "",
  editorMsgType: "err",
  gasUrl: store.get("typing-gas-url", ""),

};

function saveCats(opts) {
  store.set("typing-cats-v2", S.cats);
  if (!opts || opts.sync !== false) scheduleSync();
}

/* ================= かぞく同期(GAS) =================
   ことばの追加はローカル即反映 → 追記マージでサーバーと合流。
   削除だけはサーバー優先(マージだと復活しちゃうため)。
   file:// から開いても動くように、POSTは no-cors で撃ちっぱなし、
   最新データの取得は GET(text)で行う。 */
let syncTimer = null;
function scheduleSync() {
  if (!S.gasUrl) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(() => syncMerge(false), 800);
}

/* GASにデータを送る(返事は読めないので待たない) */
async function postToGas(payload) {
  await fetch(S.gasUrl, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(payload),
  });
}

/* GASから最新の全データを取得する(GETなら中身を読める) */
async function fetchFromGas() {
  const url = S.gasUrl + (S.gasUrl.indexOf("?") >= 0 ? "&" : "?") + "t=" + Date.now();
  const res = await fetch(url, { method: "GET" });
  const text = await res.text();
  return JSON.parse(text);
}

async function syncMerge(manual) {
  if (!S.gasUrl) return;
  S.syncState = "syncing";
  if (S.screen === "editor") render();
  try {
    // 1. 自分のことばをサーバーへ送る(追記マージ)
    await postToGas({ action: "merge", cats: S.cats });
    // 2. サーバーが処理する少しの間を待つ
    await new Promise(r => setTimeout(r, 600));
    // 3. 合流後の最新データを取得
    const data = await fetchFromGas();
    if (data && Array.isArray(data.cats)) {
      // サーバーが空(初回など)なら自分のデータは消さない
      if (data.cats.length > 0) {
        S.cats = data.cats;
        if (!catById(S.editCatId)) S.editCatId = S.cats[0] && S.cats[0].id;
        saveCats({ sync: false });
      }
      S.syncState = "ok";
      S.lastSync = new Date();
      if (manual) setMsg("かぞく どうき かんりょう!✨", "ok");
    } else {
      throw new Error("bad response");
    }
  } catch (e) {
    S.syncState = "error";
    if (manual) setMsg("サーバーに つながらなかった… URLが /exec で おわってるか、デプロイの アクセスが「ぜんいん」か かくにんしてね");
  }
  render();
}

async function apiDelete(payload) {
  if (!S.gasUrl) return true;
  try {
    await postToGas(payload);
    await new Promise(r => setTimeout(r, 600));
    const data = await fetchFromGas();
    if (data && Array.isArray(data.cats)) {
      if (data.cats.length > 0) {
        S.cats = data.cats;
        if (!catById(S.editCatId)) S.editCatId = S.cats[0] && S.cats[0].id;
        saveCats({ sync: false });
      }
      S.syncState = "ok";
      S.lastSync = new Date();
      return true;
    }
  } catch (e) { /* ローカル削除のみで続行 */ }
  S.syncState = "error";
  return false;
}

function syncStatusText() {
  if (!S.gasUrl) return "URLを いれると、かぞく みんなで ことばを きょうゆうできるよ!";
  const t = S.lastSync ? S.lastSync.toLocaleTimeString() : "まだ";
  if (S.syncState === "syncing") return "🔄 どうきちゅう…";
  if (S.syncState === "error") return "⚠️ サーバーに つながってないよ(さいごの どうき: " + t + ")";
  return "✅ どうきOK(さいごの どうき: " + t + ")";
}

/* ================= ゲーム進行 ================= */
function startWords(catId) {
  const cat = catById(catId);
  if (!cat) return;
  if (!cat.words.length) {
    S.editCatId = catId;
    S.editorMsg = "まだ ことばが ないよ。とうろくしてから あそんでね!";
    S.editorMsgType = "err";
    go("editor");
    return;
  }
  const words = shuffle(cat.words).slice(0, Math.min(PLAY_COUNT, cat.words.length));
  S.game = {
    catId, setName: cat.emoji + " " + cat.name, queue: words, wordPos: 0,
    engine: newEngine(words[0].kana),
    hits: 0, misses: 0, combo: 0, maxCombo: 0, startTime: Date.now(),
  };
  go("play");
}

const accuracy = g => {
  const total = g.hits + g.misses;
  return total ? Math.round((g.hits / total) * 100) : 100;
};

function endRound() {
  const g = S.game;
  S.result = {
    catId: g.catId, levelName: g.setName,
    hits: g.hits, misses: g.misses, acc: accuracy(g), maxCombo: g.maxCombo,
    sec: Math.max(1, Math.round((Date.now() - g.startTime) / 1000)),
  };
  go("result");
}

function countHit(g) {
  g.hits += 1; g.combo += 1;
  g.maxCombo = Math.max(g.maxCombo, g.combo);
  if (S.soundOn) playTone(880, 0.05, "triangle");
}
function countMiss(g) {
  g.misses += 1; g.combo = 0;
  if (S.soundOn) playTone(160, 0.12, "square", 0.08);
  shakeBody();
}

/* ================= キー入力 ================= */
window.addEventListener("keydown", e => {
  const g = S.game;
  if (!g || S.screen !== "play") return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  const tag = document.activeElement ? document.activeElement.tagName : "";
  if (tag === "INPUT" || tag === "TEXTAREA") return;
  const ch = e.key.length === 1 ? e.key.toLowerCase() : "";
  if (!/^[a-z\-;]$/.test(ch)) return;
  e.preventDefault();

  const { engine: ne, result: r } = processKey(g.engine, ch);
  if (r === "miss") { countMiss(g); render(); return; }
  countHit(g);
  g.engine = ne;
  if (r === "word") {
    addSparkles(); showCheer();
    if (S.soundOn) {
      playTone(1047, 0.08, "triangle");
      setTimeout(() => playTone(1319, 0.12, "triangle"), 80);
    }
    g.wordPos += 1;
    if (g.wordPos >= g.queue.length) {
      render();
      setTimeout(endRound, 250);
      return;
    }
    g.engine = newEngine(g.queue[g.wordPos].kana);
  }
  render();
});

/* ================= ことば・さくひんの操作 ================= */
function setMsg(text, type) {
  S.editorMsg = text;
  S.editorMsgType = type || "err";
}

function validateWord(raw) {
  const kana = toHiragana(raw).replace(/\s/g, "");
  if (!kana) return { ok: false, err: "ことばが からっぽ" };
  const bad = findInvalidChars(kana);
  if (bad.length) return { ok: false, err: "うてない もじ: " + bad.join(" ") };
  return { ok: true, kana };
}

function addCustomWord() {
  const inpW = document.getElementById("inp-word");
  const inpE = document.getElementById("inp-emoji");
  const cat = catById(S.editCatId);
  if (!inpW || !cat) return;
  const raw = inpW.value.trim();
  const icon = inpE.value.trim() || cat.emoji || "💝";
  if (!raw) { setMsg("ことばを いれてね!"); render(); return; }
  const v = validateWord(raw);
  if (!v.ok) { setMsg(v.err); render(); const i = document.getElementById("inp-word"); if (i) i.value = raw; return; }
  if (cat.words.some(w => w.kana === v.kana)) { setMsg("「" + v.kana + "」は もう とうろくずみだよ!"); render(); return; }
  cat.words.push({ kana: v.kana, icon });
  saveCats();
  setMsg("「" + v.kana + "」を ついかしたよ!", "ok");
  render();
  const i = document.getElementById("inp-word");
  if (i) i.focus();
}

function bulkAdd() {
  const area = document.getElementById("bulk-area");
  const cat = catById(S.editCatId);
  if (!area || !cat) return;
  const lines = area.value.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
  if (!lines.length) { setMsg("なにも かいてないよ!"); render(); return; }
  let added = 0, dup = 0;
  const errors = [];
  for (const line of lines) {
    const parts = line.split(/[\s,、]+/).filter(Boolean);
    const rawWord = parts[0] || "";
    const icon = parts[1] || cat.emoji || "💝";
    const v = validateWord(rawWord);
    if (!v.ok) { errors.push(rawWord + "(" + v.err + ")"); continue; }
    if (cat.words.some(w => w.kana === v.kana)) { dup++; continue; }
    cat.words.push({ kana: v.kana, icon });
    added++;
  }
  saveCats();
  let msg = added + "こ ついかしたよ!";
  if (dup) msg += " / " + dup + "こは とうろくずみ";
  if (errors.length) msg += "\nエラー: " + errors.join(" / ");
  setMsg(msg, errors.length ? "err" : "ok");
  render();
}

function addCategory() {
  const inpN = document.getElementById("inp-catname");
  const inpE = document.getElementById("inp-catemoji");
  if (!inpN) return;
  const name = inpN.value.trim();
  const emoji = inpE.value.trim() || "🎮";
  if (!name) { setMsg("さくひんめいを いれてね!"); render(); return; }
  if (S.cats.some(c => c.name === name)) { setMsg("その さくひんは もう あるよ!"); render(); return; }
  const id = "cat-" + Date.now();
  S.cats.push({ id, name, emoji, builtin: false, words: [] });
  S.editCatId = id;
  saveCats();
  setMsg("「" + emoji + " " + name + "」を つくったよ! ことばを ついかしてね", "ok");
  render();
}

function deleteCategory(id) {
  const cat = catById(id);
  if (!cat || cat.builtin) return;
  if (!confirm("「" + cat.name + "」を けすよ? ことばも ぜんぶ きえちゃうよ!")) return;
  S.cats = S.cats.filter(c => c.id !== id);
  S.editCatId = S.cats[0].id;
  saveCats({ sync: false });
  setMsg("けしたよ!", "ok");
  render();
  if (S.gasUrl) {
    apiDelete({ action: "deleteCategory", catId: id }).then(ok => {
      if (!ok) setMsg("オフラインかも… オンラインのときに けさないと、どうきで もどってきちゃうよ");
      render();
    });
  }
}

/* ================= エクスポート / インポート ================= */
function exportData() {
  const data = { app: "typing-bouken", version: 2, exportedAt: new Date().toISOString(), cats: S.cats };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
  const d = new Date();
  const pad = n => String(n).padStart(2, "0");
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "typing-kotoba-" + d.getFullYear() + pad(d.getMonth() + 1) + pad(d.getDate()) + ".json";
  a.click();
  URL.revokeObjectURL(a.href);
  setMsg("エクスポートしたよ! ファイルを たいせつにね📦", "ok");
  render();
}

/* MERGE-START */
function mergeImport(cats, data) {
  if (!data || !Array.isArray(data.cats)) return { ok: false, err: "ファイルの なかみが ちがうみたい…" };
  let addedWords = 0, newCats = 0, skipped = 0;
  for (const inc of data.cats) {
    if (!inc || typeof inc.name !== "string" || !Array.isArray(inc.words)) continue;
    let target = cats.find(c => c.id === inc.id) || cats.find(c => c.name === inc.name);
    if (!target) {
      target = {
        id: "cat-" + Date.now() + "-" + Math.floor(Math.random() * 1000),
        name: inc.name, emoji: inc.emoji || "🎮", builtin: false, words: [],
      };
      cats.push(target);
      newCats++;
    }
    for (const w of inc.words) {
      if (!w || typeof w.kana !== "string") { skipped++; continue; }
      const kana = toHiragana(w.kana).replace(/\s/g, "");
      if (!kana || findInvalidChars(kana).length) { skipped++; continue; }
      if (target.words.some(x => x.kana === kana)) { skipped++; continue; }
      target.words.push({ kana, icon: (typeof w.icon === "string" && w.icon) ? w.icon : (target.emoji || "💝") });
      addedWords++;
    }
  }
  return { ok: true, addedWords, newCats, skipped };
}
/* MERGE-END */

function importData(file) {
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      const r = mergeImport(S.cats, data);
      if (!r.ok) { setMsg(r.err); render(); return; }
      saveCats();
      let msg = "インポートかんりょう! ことば " + r.addedWords + "こ ついか";
      if (r.newCats) msg += " / あたらしい さくひん " + r.newCats + "こ";
      if (r.skipped) msg += " / " + r.skipped + "こは スキップ(とうろくずみ など)";
      setMsg(msg, "ok");
      render();
    } catch (e) {
      setMsg("よみこめなかった… ファイルが こわれてるかも");
      render();
    }
  };
  reader.readAsText(file);
}

/* ボタンのイベント(イベント移譲) */
app.addEventListener("click", e => {
  const btn = e.target.closest("[data-action]");
  if (!btn) return;
  const action = btn.dataset.action, arg = btn.dataset.arg;
  if (action === "play") startWords(arg);
  else if (action === "editor") { setMsg(""); go("editor"); }
  else if (action === "gohome") goHome();
  else if (action === "selcat") { S.editCatId = arg; setMsg(""); render(); }
  else if (action === "addcat") addCategory();
  else if (action === "addword") addCustomWord();
  else if (action === "bulkadd") bulkAdd();
  else if (action === "delcat") deleteCategory(arg);
  else if (action === "export") exportData();
  else if (action === "import") {
    const f = document.getElementById("imp-file");
    if (f) f.click();
  }
  else if (action === "savegas") {
    const inp = document.getElementById("inp-gasurl");
    S.gasUrl = inp ? inp.value.trim() : "";
    store.set("typing-gas-url", S.gasUrl);
    S.syncState = S.gasUrl ? "syncing" : "off";
    setMsg(S.gasUrl ? "URLを ほぞんしたよ! どうきしてみるね" : "URLを けしたよ(このパソコンだけの ほぞんに なるよ)", "ok");
    render();
    if (S.gasUrl) syncMerge(true);
  }
  else if (action === "syncnow") syncMerge(true);
  else if (action === "delword") {
    const cat = catById(S.editCatId);
    if (cat) {
      const w = cat.words[Number(arg)];
      cat.words.splice(Number(arg), 1);
      saveCats({ sync: false });
      setMsg("");
      render();
      if (w && S.gasUrl) {
        apiDelete({ action: "deleteWord", catId: cat.id, kana: w.kana }).then(ok => {
          if (!ok) setMsg("オフラインかも… オンラインのときに けさないと、どうきで もどってきちゃうよ");
          render();
        });
      }
    }
  }
});

/* インポート用ファイル選択(イベント移譲) */
app.addEventListener("change", e => {
  if (e.target.id === "imp-file" && e.target.files && e.target.files[0]) {
    importData(e.target.files[0]);
    e.target.value = "";
  }
});

/* Enterキーでことば追加 */
app.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  if (e.target.id === "inp-word" || e.target.id === "inp-emoji") { e.preventDefault(); addCustomWord(); }
  if (e.target.id === "inp-catname" || e.target.id === "inp-catemoji") { e.preventDefault(); addCategory(); }
});

render();
if (S.gasUrl) syncMerge(false);
</script>
